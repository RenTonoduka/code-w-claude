ink of when I was a junior engineer, I\n03:23  had this mentor and I would walk over to\n03:25  his desk and I would say, \"Hey, Tony,\n03:27  can you help me with this bug?\" and he\n03:29  would whipping it open his terminal and\n03:31  he'd be like doing all these crazy bash\n03:33  commands and changing things around in\n03:34  Vim and I'd always walk away thinking,\n03:36  \"Wow, that was crazy. I should learn how\n03:38  to do that.\" Um, I never did. But having\n03:42  Claude Code on your computer is kind of\n03:44  like having Tony next to you all the\n03:46  time.\n03:49  So, how does Claude code kind of work\n03:52  under the hood? At Anthropic, we try to\n03:57  always do what we call the simple thing\n03:59  that works. And what that means for\n04:01  Cloud Code is it's what we would\n04:03  consider a very pure agent. And\n04:06  anthropic, when we talk about agents,\n04:09  what we really mean is some\n04:11  instructions, some powerful tools, and\n04:14  you let the model just run in a loop\n04:16  until it decides it's done. And that's\n04:18  really what Cloud Code is. So it's\n04:21  tools, powerful tools, and the tools\n04:24  that you know someone that was really\n04:25  good at a terminal would be able to use\n04:27  tools to create and edit files to use\n04:29  the terminal. And then you can also do\n04:31  things like pull in other things with\n04:33  MCP.\n04:35  Now, on top of that, there's how Claude\n04:39  understands the codebase. And if you're\n04:41  going to build a coding agent or a\n04:43  coding tool a year ago, you'd probably\n04:46  have ideas like, well, okay, I'm going\n04:47  to get this user message about something\n04:50  about this codebase and I'll need to\n04:51  figure out which files are relevant. So\n04:53  maybe I'll like index the whole codebase\n04:55  and embed it and do this fancy like kind\n04:58  of rag retrieval thing. That is not how\n05:01  cloud code works. We don't do any sort\n05:03  of indexing. Instead, ry and\n08:10  you say hey build me an app build me a\n08:12  game that demos where very well it's\n08:15  very fun to do it's very grat\n08:16  gratifying. Of course, in reality, what\n08:19  really matters is is cloud code good\n08:21  working in existing code bases. And this\n08:23  is primarily what we focus on. Um, on\n08:28  the cloud code team, we have in our\n08:30  codebase abnormally high, I would say,\n08:32  unit test coverage. And that's because\n08:35  cloud code makes it so easy and just\n08:39  straightforward to add unit tests. So,\n08:41  we have great code coverage. And then\n08:43  the other thing we have in cloud code in\n08:44  our own codebase is we have great\n08:46  commits and PR messages because when we\n08:48  finish working we'll just say hey cloud\n08:50  write the commit for me write the PR\n08:51  message for me.\n08:54  We also see great opportunities to use\n08:56  cloud code in kind of the deployment\n08:59  like deployments and in other parts of\n09:02  the life cycle. And this is a few other\n09:04  people have talked about this but this\n09:05  is using the cloud code SDK. So using it\n09:08  headlessly, using it programmatically,\n09:11  being able to sprinkle in a coding agent\n09:14  agent anywhere. And so that's things\n09:17  like sprinkling it into CI/CD to use it\n09:19  in GitHub for instance to help people um\n09:23  programmatically.\n09:24  And then finally, it's great kind of\n09:26  with support and scale. It can help you\n09:28  debug errors faster. One thing that we\n09:31  saw when we started giving cloud code to\n09:33  customers and talking to them about it,\n09:35  we didn't totally predict this was a lot\n09:37  of customers or potential customers\n09:39  said, \"Hey, we've been me we've been\n09:41  kind of putting off this like large\n09:42  codebase migration. People that are on\n09:44  old versions of Java trying to get to a\n09:47  new one or a team that's on PHP and\n09:50  they're trying to get to React or\n09:51  Angular. We've talked to multiple teams\n09:52  like this and having a tool like Cloud\n09:55  Code makes projects like that a little\n09:57  more digestible. when you go to your\n09:59  team and you say, \"Hey, we're going to\n10:00  spend a month, you know, refactoring or\n10:02  rewriting large parts of the codebase.\"\n10:06  And then on top of that, and this kind\n10:08  of matters across all these, is once\n10:10  again remember Claude is great at the\n10:12  terminal. And that means it's going to\n10:14  be great at all those different CLI\n10:16  tools, things like Git, Docker, Big\n10:18  Query, things like that. I never have to\n10:21  worry about, oh, I'm going to get\n10:22  myself, how do I get myself out of this\n10:24  sticky rebase? I'll just fire up cloud\n10:27  code and tell it the situation and be\n10:29  like, \"Hey, can you fix this for me?\"\n10:30  It's incredible.\n10:33  Now, let's talk about best practices.\n10:37  And the first one is not going to be a\n10:39  surprise, but the first one is use\n10:41  claw.md files. So, remember that cloud\n10:45  code, like I said, is an agent and it\n10:47  has some tools, has some lightweight\n10:49  instructions in the prompt, but it\n10:51  doesn't really have memory. And so the\n10:54  main way we share state across kind of\n10:56  sessions or across our team when we fire\n10:59  up cla code in the same codebase over\n11:01  and over again is this cloud.mmd file.\n11:04  So when we start cla what happens is if\n11:07  there's this claw.md file in the working\n11:09  directory it's just plopped into\n11:11  context. It's plopped into the prompt.\n11:13  And basically what it says is hey claude\n11:15  by the way these are important\n11:16  instructions the developer left for you.\n11:18  Be sure to pay close attention to this.\n11:21  And there's various places you can put\n11:23  the cloudmd file. You can put it in a\n11:25  project and check it in so all your\n11:27  teammates share it. You could put one in\n11:29  your home directory if there's things\n11:30  you just want claude to always know\n11:32  about regardless of what you're working\n11:33  on. And the things you put in here are\n11:35  things like, hey, by the way, maybe this\n11:38  is how you run the unit tests. Or just\n11:40  so you know, to make kind of your\n11:42  searching and life easier, here's like\n11:44  just like an overview of kind of how\n11:46  this project is laid out, where the\n11:48  tests live, what different modules are,\n11:50  things like that. or here's our style\n11:52  guide. All sorts of things like that to\n11:54  just make Claude's life a bit easier.\n11:56  And you can build these things up over\n12:01  The other thing you can do, which is\n12:02  important, is permission management.\n12:05  When you're running Cloud Code, there's\n12:06  all sorts of different kind of\n12:08  permission things flying by. Kind of out\n12:10  of the box, what happens when you start\n12:12  our tool is for read actions. If Claude\n12:15  is searching or reading, we just let it\n12:17  go. But once it starts writing or\n12:20  running bash commands or doing things\n12:22  that could change change stuff on your\n12:25  machine potentially, that's when we kick\n12:27  in this UI and it says something like\n12:29  yes, yes, always allow this or no, um, I\n12:33  want to do something else. And using\n12:36  that permission management and being\n12:38  smart about it can help you work faster.\n12:40  So there's something called autoaccept\n12:42  mode where if you're working with cloud\n12:44  code and you press shift tab, claude\n12:46  will just start working. There's things\n12:48  you can do like you can configure claude\n12:50  in the settings where specific commands\n12:53  like on bash like if you just are like\n12:55  tired of saying yes run npm run test you\n12:58  can just always approve that. So\n13:00  fiddling with your permission management\n13:02  is a great way rs\n14:40  everything out except for for instance\n14:43  claw.mmd or you can run slash compact\n14:46  and what'll happen is basically it's\n14:48  like a user message is inserted and it\n14:51  just says something like hey I need to\n14:53  go summarize everything we've been up\n14:55  to. I'm going to give this to another\n14:56  developer and they're going to pick up\n14:58  where I left off. And then that summary\n15:00  is what kind of seeds the next session.\n15:02  You can go from there. We spend a lot of\n15:04  time tuning this kind of compact\n15:06  functionality so that as you max out the\n15:08  context window and then run compact, you\n15:10  can start back over and keep going\n15:14  efficient workflows. What can you do\n15:16  with cloud code? And how do you get the\n15:18  most out? So using planning and to-dos.\n15:21  talked a little bit about this before,\n15:23  but one of the best things you can do is\n15:25  when you open up Cloud Code, instead of\n15:26  saying, \"Hey, I need you to fix this\n15:28  bug,\" you can say, \"Hey, I have this\n15:30  bug. Can you search around, figure out\n15:32  what's causing it, and just like tell me\n15:34  a plan how we're going to fix it?\" And\n15:36  this can save you a lot of time because\n15:38  you can verify, you can read Claude's\n15:40  plan, and you can verify what it's going\n15:42  to do. And then the other thing that we\n15:44  have is we have this to-do list feature.\n15:46  So often when Claude's working on a big\n15:49  task, it'll create a to-do list. And if\n15:52  you're kind of paying attention, you can\n15:53  kind of watch this to-do list, and if\n15:55  you see anything kind of weirder in\n15:57  there or something that doesn't make\n15:58  sense, that's when you can press escape\n16:00  and say, \"Hey Claude, let's change the\n16:01  to-do list. I think you're on the wrong\n16:03  path.\" Smart vibe coding. So it's very\n16:07  tempting and it's very powerful to just\n16:08  let Claude work and press enter and see\n16:10  what happens at the end. I think there's\n16:13  a few things that can help make this\n16:14  better. And there's I think a talk later\n16:16  today about just this for 30 minutes.\n16:19  But doing things like having test-driven\n16:21  development, having Claude make small\n16:23  changes, run the tests, make sure they\n16:25  pass, always having Claude do things\n16:28  like check the TypeScript and the\n16:29  linting, and then commit regularly so\n16:32  that if it's kind of going off the\n16:33  rails, you can always fall back and try\n16:35  again. You can use screenshots to guide\n16:38  and debug. So Claude is built on top of\n16:41  our models which are multimodal. You can\n16:43  always just grab a screenshot, paste it\n16:45  in, or if you have a file somewhere\n16:47  that's an image, you can just say, \"Hey,\n16:49  Claude, look at this mock.png\n16:51  and then build the website for me or\n16:53  whatever.\"\n16:55  And then advanced techniques. So, as\n16:57  you're getting used to using Claude,\n16:59  what are some things you can think about\n17:02  uh to kind of push things to the next\n17:03  level? And one of the things we see both\n17:06  internally and with customers is when\n17:08  you've started to use this tool for a\n17:09  while, it's going to be very tempting to\n17:12  use multiple clouds at once. And so I\n17:15  know people at Anthropic and a few\n17:16  customers that run four clouds at the\n17:18  same time. There's various ways to do\n17:20  this. You can have it in T-Mox or just\n17:23  different tabs, all sorts of crazy\n17:25  things. So I would challenge you to try\n17:28  getting multiple clubs running at once\n17:30  and kind of be orchestrating all these\n17:32  things. It's quite fun. I can only do\n17:33  two, but I know people that do four. Use\n17:37  escape. So, escape is your best friend.\n17:40  While Claude is working, you can kind of\n17:42  keep an eye on what it's up to, and 5168\u4f53\u306b\u8868\u793a\u3055\u308c\u307e\u3059\u3002\u304a\u305d\u3089\u304f\u8a71\u306f\u3042\u308b\u3060\u308d\u3046\u304c\u3001\u554f\u984c\u304c\u3042\u308b\n\u30eb\u30fc\u30c8\u3068\u30eb\u30fc\u30c4\u3068\u547c\u3070\u308c\u308b\u3082\n\u8208\u5473\u6df1\u3044\u70b9\u3067\u3059\u3002\u60f3\u50cf\u3057\u3066\u307f\u307e\u3057\u3087\u3046\n\u4eca\u65e5\u306f\n\u3068\u3044\u3046 MCP \u30b5\u30fc\u30d0\u30fc\u3092\u69cb\u7bc9\u3057\u305f\u3044\u3068\u8003\u3048\u3066\u3044\u307e\u3059\u3002\u4e0d\u8981\u306a git \u30b3\u30de\u30f3\u30c9\u3092\u51e6\u7406\u3057\u307e\u3059\ngit\u3092\u6271\u3046\u305f\u3081\u3002\u3084\u308a\u305f\u304f\u306a\u3044\n\u30bd\u30fc\u30b9\u7ba1\u7406\u30b3\u30de\u30f3\u30c9\u3002\u3057\u307e\u305b\u3093\n\u305d\u308c\u306e\u3069\u308c\u304b\u3092\u899a\u3048\u3066\u304a\u3044\u3066\u304f\u3060\u3055\u3044\u3002 MCP\u304c\u6b32\u3057\u3044\u3067\u3059\nMCP \u30b5\u30fc\u30d0\u30fc\u3068\u540c\u69d8\u306b\u3053\u308c\u3092\u51e6\u7406\u3057\u307e\u3059\u3002\n\u305d\u308c\u3067\u306f\u3001MCP \u3092\u63a5\u7d9a\u3057\u307e\u3059\n\u30b5\u30fc\u30d0\u30fc\u3092\u304a\u6c17\u306b\u5165\u308a\u306e IDE \u306b\u63a5\u7d9a\u3057\u307e\u3059\u3002\u3057\u304b\u3057\u3069\u3046\u3084\u3063\u3066\nIDE \u306f\u77e5\u3063\u3066\u3044\u307e\u3059\u304b? MC \u306f\u7533\u3057\u8a33\u3042\u308a\u307e\u305b\u3093\u304c\u3001\nMCP \u30b5\u30fc\u30d0\u30fc\u306f\u3069\u306e\u3088\u3046\u306b\u3057\u3066\u8a8d\u8b58\u3059\u308b\u306e\u3067\u3059\u304b\nIDE \u3067\u958b\u3044\u3066\u3044\u308b\u30d7\u30ed\u30b8\u30a7\u30af\u30c8\u3068\u306f\u4f55\u3067\u3059\u304b?\n\u660e\u3089\u304b\u306b git \u3092\u5b9f\u884c\u3057\u305f\u3044\u304b\u3089\u3067\u3059\n\u958b\u3044\u3066\u3044\u308b\u30ef\u30fc\u30af\u30b9\u30da\u30fc\u30b9\u5185\u306e\u30b3\u30de\u30f3\u30c9\n\u53f3\uff1f\u3057\u305f\u304c\u3063\u3066\u3001root \u306f\n\u306e\u305f\u3081\u306e\u65b9\u6cd5\u3067\u3059\u3002\u30b5\u30fc\u30d0\u30fc\nVS\u306a\u3069\u306e\u30af\u30e9\u30a4\u30a2\u30
